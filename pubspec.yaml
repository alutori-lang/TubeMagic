name: yt_autopub
description: "TubeRocket - AI-powered YouTube video publisher. Auto generates titles, tags, descriptions, thumbnails and uploads to YouTube."
publish_to: 'none'
version: 1.0.1+4

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Google Sign In & YouTube API
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Sign in with Apple
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  # HTTP & API calls
  http: ^1.3.0

  # File & Video picking
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  video_player: ^2.9.2

  # State management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.4

  # Path & file utils
  path_provider: ^2.1.5
  path: ^1.9.1

  # UUID
  uuid: ^4.5.1

  # Permissions
  permission_handler: ^11.3.1

  # Loading indicators
  flutter_spinkit: ^5.2.1

  # Text to Speech (voice preview)
  flutter_tts: ^4.2.0

  # Google Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
