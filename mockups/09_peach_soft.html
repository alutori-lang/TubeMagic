<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, max-width=400, initial-scale=1.0">
<title>9 - Peach Soft</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;min-height:100vh;display:flex;justify-content:center;background:#FFF8F3}
.phone{width:390px;min-height:844px;background:#FFF8F3;padding:24px;display:flex;flex-direction:column}

.header{text-align:center;margin-top:16px}
.header h1{font-size:28px;font-weight:800;color:#E8590C}
.header p{font-size:12px;color:#FFB088;margin-top:2px;font-weight:600}

/* Cute rounded upload */
.upload{margin:30px 0 16px;border-radius:32px;padding:36px;text-align:center;
background:#fff;cursor:pointer;transition:all 0.3s;
box-shadow:0 4px 20px rgba(232,89,12,0.08)}
.upload:hover{box-shadow:0 10px 35px rgba(232,89,12,0.15);transform:translateY(-4px)}
.upload:active{transform:translateY(0)}
.u-icon{width:90px;height:90px;border-radius:24px;
background:linear-gradient(145deg,#FF922B,#E8590C);margin:0 auto;
display:flex;align-items:center;justify-content:center;font-size:38px;color:#fff;
box-shadow:0 8px 25px rgba(232,89,12,0.25);transition:all 0.3s}
.upload:hover .u-icon{transform:scale(1.05)}
.upload h2{font-size:20px;font-weight:800;color:#333;margin-top:16px}
.upload p{font-size:12px;color:#ccc;margin-top:4px}

/* Simple circular progress */
.progress-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0;min-height:24px}
.pr-circle{width:18px;height:18px;border-radius:50%;border:2.5px solid #FFE0CC;position:relative}
.pr-circle .fill{position:absolute;top:-2.5px;left:-2.5px;width:18px;height:18px;border-radius:50%;
border:2.5px solid #E8590C;border-right-color:transparent;border-bottom-color:transparent;opacity:0;
transition:all 0.3s}
.pr-circle.active .fill{opacity:1;animation:spin 1s linear infinite}
.pr-circle.done{border-color:#2ed573}
.pr-circle.done .fill{opacity:0}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.pr-text{font-size:13px;color:#ccc;font-weight:600}
.pr-text.active{color:#E8590C}
.pr-text.done{color:#2ed573}

/* Settings - rounded items */
.settings{flex:1}
.s-label{font-size:10px;color:#FFB088;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.s-item{display:flex;align-items:center;padding:12px 16px;background:#fff;border-radius:16px;
margin-bottom:8px;cursor:pointer;transition:all 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.03)}
.s-item:hover{transform:translateX(4px);box-shadow:0 3px 12px rgba(232,89,12,0.08)}
.si-emoji{font-size:18px;margin-right:12px}
.si-label{flex:1;font-size:14px;color:#333;font-weight:700}
.si-value{font-size:12px;color:#FFB088;font-weight:600}

.pub-btn{width:100%;padding:16px;border:none;border-radius:16px;
background:linear-gradient(145deg,#FF922B,#E8590C);color:#fff;font-size:16px;font-weight:800;
cursor:pointer;font-family:'Nunito',sans-serif;margin-top:12px;
box-shadow:0 6px 20px rgba(232,89,12,0.25);transition:all 0.2s}
.pub-btn:hover{box-shadow:0 10px 30px rgba(232,89,12,0.35)}
</style>
</head>
<body>
<div class="phone">
<div class="header"><h1>TubeMagic</h1><p>Soft & Easy</p></div>
<div class="upload" onclick="go()">
<div class="u-icon">&#11014;</div>
<h2>Upload & Publish</h2>
<p>1 click does everything</p>
</div>
<div class="progress-row">
<div class="pr-circle" id="pc"><div class="fill"></div></div>
<div class="pr-text" id="pt"></div>
</div>
<div class="settings">
<div class="s-label">Settings</div>
<div class="s-item"><span class="si-emoji">&#127760;</span><span class="si-label">Language</span><span class="si-value">Punjabi</span></div>
<div class="s-item"><span class="si-emoji">&#128444;</span><span class="si-label">Thumbnail</span><span class="si-value">Auto</span></div>
<div class="s-item"><span class="si-emoji">&#127908;</span><span class="si-label">Voice</span><span class="si-value">Original</span></div>
<div class="s-item"><span class="si-emoji">&#128274;</span><span class="si-label">Visibility</span><span class="si-value">Public</span></div>
<div class="s-item"><span class="si-emoji">&#127991;</span><span class="si-label">Category</span><span class="si-value">Music</span></div>
<div class="s-item"><span class="si-emoji">&#128100;</span><span class="si-label">Channel</span><span class="si-value">My Channel</span></div>
</div>
<button class="pub-btn" onclick="go()">Publish All</button>
</div>
<script>
function go(){const c=document.getElementById('pc'),t=document.getElementById('pt');
c.className='pr-circle active';t.className='pr-text active';t.textContent='Publishing...';
setTimeout(()=>{c.className='pr-circle done';t.className='pr-text done';t.textContent='All done!';},3500);
setTimeout(()=>{c.className='pr-circle';t.className='pr-text';t.textContent='';},7000);}
</script>
</body>
</html>
