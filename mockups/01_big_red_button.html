<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, max-width=400, initial-scale=1.0">
<title>1 - Big Red Button</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;min-height:100vh;display:flex;justify-content:center;background:#fff}
.phone{width:390px;min-height:844px;background:#fff;display:flex;flex-direction:column;align-items:center;padding:20px}

.title{margin-top:30px;text-align:center}
.title h1{font-size:32px;font-weight:800;color:#1a1a1a}
.title p{font-size:13px;color:#999;margin-top:4px}

/* Giant upload button */
.big-btn-area{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column}
.mega-btn{width:200px;height:200px;border-radius:50%;background:linear-gradient(145deg,#FF4757,#FF6B81);
border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;
box-shadow:0 15px 40px rgba(255,71,87,0.35);transition:all 0.3s;position:relative}
.mega-btn:hover{transform:scale(1.05);box-shadow:0 20px 60px rgba(255,71,87,0.45)}
.mega-btn:active{transform:scale(0.95);box-shadow:0 8px 20px rgba(255,71,87,0.3)}
.mega-btn .arrow{font-size:48px;color:#fff}
.mega-btn .btn-text{color:#fff;font-size:14px;font-weight:700;margin-top:4px;letter-spacing:1px}

/* Pulse animation */
.mega-btn::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;
background:rgba(255,71,87,0.2);animation:pulse 2s ease-out infinite}
@keyframes pulse{0%{transform:scale(1);opacity:0.6}100%{transform:scale(1.4);opacity:0}}

/* Status */
.status{margin-top:20px;font-size:14px;color:#999;min-height:22px;font-weight:600;text-align:center}
.status.active{color:#FF4757}
.status.done{color:#2ed573}

/* Progress bar */
.prog{width:80%;height:4px;background:#f0f0f0;border-radius:2px;margin-top:10px;overflow:hidden}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#FF4757,#FF6B81);transition:width 3.5s linear;border-radius:2px}

/* Small settings chips at bottom */
.settings{width:100%;padding:20px 0}
.settings-title{font-size:11px;color:#bbb;text-align:center;margin-bottom:10px;text-transform:uppercase;letter-spacing:2px}
.chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
.chip{padding:8px 16px;border-radius:20px;background:#f5f5f5;font-size:12px;color:#666;cursor:pointer;
display:flex;align-items:center;gap:6px;transition:all 0.2s}
.chip:hover{background:#FF4757;color:#fff}
.chip .ci{font-size:14px}
</style>
</head>
<body>
<div class="phone">
<div class="title"><h1>TubeMagic</h1><p>1 tap to publish everything</p></div>
<div class="big-btn-area">
<button class="mega-btn" onclick="go()">
<span class="arrow">&#11014;</span>
<span class="btn-text">UPLOAD</span>
</button>
<div class="status" id="s"></div>
<div class="prog"><div class="prog-fill" id="pf"></div></div>
</div>
<div class="settings">
<div class="settings-title">Settings</div>
<div class="chips">
<div class="chip"><span class="ci">&#127760;</span>Punjabi</div>
<div class="chip"><span class="ci">&#128444;</span>Auto Thumb</div>
<div class="chip"><span class="ci">&#127908;</span>Original</div>
<div class="chip"><span class="ci">&#128274;</span>Public</div>
<div class="chip"><span class="ci">&#127991;</span>Music</div>
<div class="chip"><span class="ci">&#128100;</span>My Channel</div>
</div>
</div>
</div>
<script>
function go(){const s=document.getElementById('s'),p=document.getElementById('pf');
s.className='status active';s.textContent='Uploading & publishing...';p.style.width='100%';
setTimeout(()=>{s.className='status done';s.textContent='All published! ';p.style.background='#2ed573';},3500);
setTimeout(()=>{s.className='status';s.textContent='';p.style.width='0%';p.style.background='';},7000);}
</script>
</body>
</html>
